  <main class="container">
    <h1>¡Regístrate con nosotros!</h1>
    <div class="registro-container">
      <hr>
      <h2>Registro</h2>
      <form action="submit_page" method="POST" class="registro-form">
        
        <div class="form-group">
          <label for="name">Nombre completo:</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="dob">Fecha de nacimiento:</label>
          <input type="date" id="dob" name="dob" required>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico:</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Número de teléfono:</label>
          <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="form-group">
          <label for="address">Dirección:</label>
          <input type="text" id="address" name="address" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
          <label for="course">Selecciona un curso:</label>
          <select id="course" name="course" required>
            <option value="">-- Selecciona un curso --</option>
            <option value="html-css">HTML y CSS</option>
            <option value="javascript">JavaScript</option>
          </select>
        </div>

        <p id="error-message" class="error">Por favor, completa todos los campos.</p>

        <button type="submit" class="btn-primary">Registrarse</button>
      </form>
    </div>
  </main>
